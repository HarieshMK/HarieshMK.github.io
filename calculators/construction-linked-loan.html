---
layout: default
title: Home Loan Ledger
permalink: /calculators/clhl/
---

<div class="calculator-container">
    <div class="calc-inputs">
        <div class="post-card calculation-card">
            <div class="section-card-header">
                <h3>🏢 Property Profile</h3>
            </div>
            <div class="section-card-content">
                <div class="calc-grid-layout" id="propertyProfileContainer">
                    <div class="charge-row">
                        <label>Super Built-up Area (sq.ft)</label>
                        <input type="number" id="superArea" placeholder="e.g. 500">
                        <div></div> <div>🔒</div> </div>
                
                    <div class="charge-row">
                        <label>Price per sq.ft (₹)</label>
                        <input type="number" id="pricePerSqft" placeholder="e.g. 5000">
                        <div></div> <div>🔒</div> </div>
                
                    <div class="charge-row">
                        <label>Basic Cost of property</label>
                        <input type="number" id="basicCost" readonly>
                        <div></div> <div>🔒</div> </div>
                
                    <div id="extraChargesContainer"></div>
                </div>
                <button id="addChargeBtn" class="btn-secondary-outline premium-btn-base" style="width: 100%; margin-top: 15px;">+ Add Extra Charge</button>
            </div>
        </div>
        <!-- 2. Loan Particulars (Updated with Start/EMI Dates) -->
    <div class="post-card calculation-card" style="margin-top: 25px;">
        <div class="section-card-header">
            <h3>🏦 Loan Particulars</h3>
        </div>
        <div class="section-card-content">
            <div class="calc-grid-layout">
                <div class="calc-custom-row">
                    <label>Loan Amount (₹)</label>
                    <input type="number" id="loanAmount" placeholder="e.g. 4000000">
                </div>
                <div class="calc-custom-row">
                    <label>Interest Rate (%)</label>
                    <input type="number" id="interestRate" placeholder="e.g. 8">
                </div>
                <div class="calc-custom-row">
                    <label>Tenure (Years)</label>
                    <input type="number" id="tenureYears" placeholder="e.g. 30">
                </div>
                <!-- New Date Inputs -->
                <div class="calc-custom-row">
                    <label>Loan Start Date</label>
                    <input type="date" id="loanStartDate">
                </div>
                <div class="calc-custom-row">
                    <label>EMI Start Date</label>
                    <input type="date" id="emiStartDate">
                </div>
            </div>
        </div>
    </div>

    <!-- 3. NEW: Moratorium Period Card -->
    <div class="post-card calculation-card" style="margin-top: 25px;">
        <div class="section-card-header">
            <h3>⏳ Moratorium Period</h3>
        </div>
        <div class="section-card-content">
            <div class="calc-grid-layout" style="gap: 15px;">
                <div class="radio-group" style="display: flex; flex-direction: column; gap: 10px;">
                    <label><input type="radio" name="moroType" value="18" checked> 18 Months (Standard)</label>
                    <label><input type="radio" name="moroType" value="milestone"> Until Last Milestone</label>
                    <label style="display: flex; align-items: center; gap: 10px;">
                        <input type="radio" name="moroType" value="custom"> Custom: 
                        <input type="number" id="customMoroMonths" style="width: 80px; height: 35px; border-radius: 8px; border: 1px solid var(--border-base); padding: 0 5px;" placeholder="Months">
                    </label>
                </div>
            </div>
        </div>
    </div>
</div>
    <div class="calc-results sticky-score-panel">
        <div class="sidebar-panel-header-accent">
            <h3 class="sidebar-panel-heading">Summary</h3>
        </div>
        <div class="sidebar-stacked-rows-container">
            <div class="regime-row-card">
                <span class="regime-row-title">Total Property Cost</span>
                <div class="regime-row-value" id="totalPropertyCost">₹ 0</div>
            </div>
            <div class="regime-row-card">
                <span class="regime-row-title">Closing Principal</span>
                <div class="regime-row-value" id="closingPrincipal">₹ 0</div>
            </div>
            <div class="regime-row-card">
                <span class="regime-row-title">Unpaid Interest</span>
                <div class="regime-row-value" id="unpaidInterest">₹ 0</div>
            </div>
        </div>
    </div>
</div>
    <div class="calculator-container" style="margin-top: 20px;">
        <h3>Transaction Ledger</h3>
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Type</th>
                        <th>Amount</th>
                    </tr>
                </thead>
                <tbody id="transactionBody">
                    </tbody>
            </table>
        </div>
        <button id="addRowBtn" class="premium-btn-base btn-secondary-outline">+ Add Transaction</button>
    </div>

<script src="/assets/js/finance-engine.js"></script>
<script src="/assets/js/clhl-calculator.js"></script>

<style>
/* ==========================================================================
   LOAN CALCULATOR - PREMIUM STYLING
   ========================================================================== */

/* Main Container & Layout */
.calculator-container { display: flex !important; align-items: flex-start !important; gap: 30px !important; position: relative !important; flex-wrap: wrap !important; padding: 10px !important; padding-bottom: 100px !important; }
.calc-inputs { flex: 1 !important; min-width: 600px !important; }

/* Card Styling */
.post-card.calculation-card { background: var(--bg-container) !important; border: 1.5px solid var(--border-base) !important; border-radius: 16px !important; padding: 0 !important; margin-bottom: 25px !important; overflow: hidden; }
.section-card-header { padding: 20px 25px; border-bottom: 1.5px solid var(--border-base); }
.section-card-header h3 { font-family: 'Lora', serif; font-size: 1.3rem !important; margin: 0 !important; color: var(--text-primary); }
.section-card-content { padding: 20px 25px; }

/* Standard Row Input Layout */
.calc-grid-layout { display: flex !important; flex-direction: column !important; gap: 20px !important; }
.calc-custom-row { display: flex !important; flex-direction: row !important; align-items: center !important; justify-content: space-between !important; gap: 20px !important; }
.calc-custom-row label { flex: 0 0 40% !important; font-size: 1rem !important; font-weight: 600 !important; color: var(--text-primary); margin: 0 !important; }
.calc-custom-row input { flex: 1 !important; height: 50px !important; padding: 0 15px !important; border-radius: 14px !important; font-family: 'JetBrains Mono', monospace !important; font-size: 1rem !important; font-weight: 700 !important; background-color: var(--bg-container) !important; border: 1.5px solid var(--border-base) !important; color: var(--text-primary) !important; }
.calc-custom-row input:focus { border-color: var(--brand-primary) !important; outline: none; }

/* Results Sidebar */
.calc-results.sticky-score-panel { display: block !important; background: var(--bg-container) !important; padding: 24px !important; border-radius: 16px !important; border: 1.5px solid var(--border-base) !important; width: 350px !important; position: sticky !important; top: 20px !important; flex-shrink: 0 !important; }
.sidebar-panel-header-accent { border-bottom: 1.5px solid var(--border-base); margin-bottom: 20px; padding-bottom: 10px; }
.sidebar-panel-heading { font-family: 'Lora', serif; font-size: 1.2rem; margin: 0; }
.regime-row-card { display: flex; flex-direction: column; align-items: center; padding: 20px 15px; border-radius: 12px; border: 1.5px solid var(--border-base) !important; background-color: var(--bg-offset) !important; margin-bottom: 15px; }
.regime-row-title { font-size: 0.85rem; color: var(--text-secondary); text-transform: uppercase; margin-bottom: 8px; }
.regime-row-value { font-family: 'JetBrains Mono', monospace !important; font-size: 1.5rem; font-weight: 700; color: var(--text-primary); }

/* Extra Charges - Row Grid Layout */
#extraChargesContainer { margin-top: 20px; padding-top: 15px; border-top: 1px solid var(--border-base); }
.charge-row { display: grid !important; grid-template-columns: 2fr 1.5fr 1fr 0.5fr !important; gap: 10px !important; align-items: center !important; margin-bottom: 12px !important; }
.charge-row input { height: 40px !important; padding: 0 10px !important; border: 1.5px solid var(--border-base) !important; border-radius: 8px !important; }
.charge-row label { display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 0.9rem; }
.btn-delete, .btn-save { cursor: pointer; border: none; background: none; font-size: 1.2rem; }

/* Readonly Styling for Locked Rows */
input[readonly] { background-color: var(--bg-offset) !important; cursor: not-allowed !important; color: var(--text-secondary) !important; }

/* Mobile Responsive */
@media (max-width: 768px) {
    .calc-inputs { min-width: 100% !important; }
    .calc-results { width: 100% !important; position: relative !important; }
    .calc-custom-row, .charge-row { flex-direction: column !important; align-items: flex-start !important; grid-template-columns: 1fr !important;}
    .calc-custom-row label { flex: 0 0 100% !important; margin-bottom: 8px !important; }
}
</style>
